<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="천안시 정책 찾기 — 나에게 필요한 정부·지자체 혜택을 찾아드려요">
<meta property="og:title" content="천안시 정책 찾기">
<meta property="og:description" content="나에게 필요한 정부·지자체 혜택을 찾아드려요">
<title>천안시 정책 찾기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1B5E8C;
    --primary-light: #E6F1FB;
    --primary-text: #0C447C;
    --green: #EAF3DE;
    --green-text: #27500A;
    --bg: #F7F8FA;
    --white: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-light: rgba(0,0,0,0.06);
    --text-main: #1a1a1a;
    --text-sub: #555;
    --text-hint: #999;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-main);
    min-height: 100vh;
  }
  /* 헤더 */
  .header {
    background: var(--white);
    border-bottom: 1px solid var(--border-light);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-icon {
    width: 38px; height: 38px;
    background: var(--primary-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-icon svg { width: 20px; height: 20px; fill: var(--primary-text); }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text-main); }
  .header-sub { font-size: 12px; color: var(--text-sub); margin-top: 1px; }

  /* 메인 */
  .main {
    max-width: 680px;
    margin: 0 auto;
    padding: 16px 16px 20px;
  }

  /* 빠른검색 칩 */
  .chips-section { margin-bottom: 16px; }
  .chips-label { font-size: 12px; color: var(--text-hint); margin-bottom: 8px; }
  .chips {
    display: flex; flex-wrap: wrap; gap: 7px;
  }
  .chip {
    font-size: 13px; padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--text-sub);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .chip:hover, .chip:active {
    background: var(--primary);
    color: var(--white);
    border-color: var(--primary);
  }

  /* 채팅 영역 */
  #chat-area {
    display: flex; flex-direction: column; gap: 12px;
    margin-bottom: 16px;
  }
  .bubble-bot {
    align-self: flex-start;
    background: var(--white);
    border: 1px solid var(--border-light);
    border-radius: 16px 16px 16px 4px;
    padding: 12px 16px;
    max-width: 88%;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-main);
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .bubble-bot .hint {
    font-size: 12px; color: var(--text-hint); margin-top: 4px; display: block;
  }
  .bubble-user {
    align-self: flex-end;
    background: var(--primary);
    color: white;
    border-radius: 16px 16px 4px 16px;
    padding: 12px 16px;
    max-width: 82%;
    font-size: 14px;
    line-height: 1.65;
  }

  /* 정책 카드 */
  .p-cards { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .p-card {
    background: var(--white);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .p-card-head {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap; margin-bottom: 6px;
  }
  .badge {
    font-size: 11px; padding: 2px 9px;
    border-radius: 20px; font-weight: 500; white-space: nowrap;
  }
  .b-n { background: #E6F1FB; color: #0C447C; }
  .b-l { background: #EAF3DE; color: #27500A; }
  .b-pregnancy { background: #EEEDFE; color: #3C3489; }
  .b-birth { background: #EAF3DE; color: #27500A; }
  .b-childcare { background: #E1F5EE; color: #085041; }
  .b-multichildren { background: #FBEAF0; color: #72243E; }
  .b-housing { background: #FAEEDA; color: #633806; }
  .b-work { background: #E6F1FB; color: #185FA5; }
  .b-youth { background: #FAECE7; color: #712B13; }
  .b-senior { background: #F1EFE8; color: #444441; }
  .b-welfare { background: #FCEBEB; color: #791F1F; }
  .p-name { font-size: 14px; font-weight: 700; color: var(--text-main); }
  .p-desc { font-size: 13px; color: var(--text-sub); line-height: 1.55; margin-bottom: 8px; }
  .p-meta { display: flex; flex-direction: column; gap: 3px; }
  .p-meta span { font-size: 12px; color: var(--text-hint); }
  .p-meta strong { color: var(--text-sub); font-weight: 500; }
  .p-contact {
    font-size: 12px; color: var(--text-hint);
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border-light);
  }
  .p-contact strong { color: var(--text-sub); font-weight: 500; }
  .result-label {
    font-size: 12px; color: var(--text-hint); margin-bottom: 4px;
  }
  .greeting { font-size: 14px; margin-bottom: 6px; font-weight: 500; }
  .tip {
    font-size: 12px; color: var(--text-hint);
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border-light);
  }

  /* 입력창 (하단 고정) */
  .input-wrap {
    background: var(--white);
    border-top: 1px solid var(--border-light);
    padding: 12px 16px;
    position: sticky;
    bottom: 0;
    z-index: 100;
  }
  .input-inner {
    max-width: 680px; margin: 0 auto;
    display: flex; gap: 8px; align-items: flex-end;
  }
  #user-input {
    flex: 1; resize: none;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text-main);
    background: var(--bg);
    min-height: 44px; max-height: 120px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.15s;
  }
  #user-input:focus { border-color: var(--primary); background: var(--white); }
  #send-btn {
    height: 44px; padding: 0 18px;
    border-radius: 12px;
    border: none;
    background: var(--primary);
    color: white;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  #send-btn:active { opacity: 0.85; }

  /* 반응형 */
  @media (max-width: 480px) {
    .bubble-bot, .bubble-user { max-width: 95%; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
  </div>
  <div>
    <div class="header-title">천안시 정책 찾기</div>
    <div class="header-sub">나에게 필요한 정부·지자체 혜택을 찾아드려요</div>
  </div>
</div>

<div class="main">
  <div class="chips-section">
    <div class="chips-label">빠른 검색</div>
    <div class="chips">
      <button class="chip" onclick="fill('결혼 예정인 30대 회사원 천안')">결혼 앞둔 직장인</button>
      <button class="chip" onclick="fill('임신 중 천안 거주')">임신 중이에요</button>

      <button class="chip" onclick="fill('일자리 취업 천안 청년')">일자리 지원</button>
      <button class="chip" onclick="fill('청년 월세 주거비 부담')">청년 주거·월세</button>

      <button class="chip" onclick="fill('다자녀 셋째 혜택')">다자녀 혜택</button>
      <button class="chip" onclick="fill('귀농 귀촌 천안 농촌 정착')">귀농·귀촌</button>
    </div>
  </div>

  <div id="chat-area">
    <div class="bubble-bot">
      안녕하세요! 나이, 직업, 상황을 편하게 입력하시면 알맞은 정책을 찾아드릴게요.
      <span class="hint">예: "천안으로 취업해서 타지역에서 이사오게 된 30세 1인가구에요. 어떤 혜택이 있나요?"</span>
    </div>
  </div>
</div>

<div class="input-wrap">
  <div class="input-inner">
    <textarea id="user-input" rows="1" placeholder="상황을 자유롭게 입력하세요..."></textarea>
    <button id="send-btn" onclick="send()">검색 ↗</button>
  </div>
</div>

const SYNONYM={"결혼":"신혼","신혼":"결혼","아이":"아동","자녀":"아동","직장":"회사","회사":"직장","집":"주택","월세":"주거","전세":"주거","노인":"어르신","어르신":"노인","취준":"취업","취준생":"청년","셋째":"다자녀","다자녀":"셋째","부부":"결혼","산후":"출산","이사":"전입","전입":"이사","귀농":"귀촌","귀촌":"귀농","혼자":"1인가구","혜택":"지원","지원금":"지원","보조금":"지원"};

function tokenize(text){
  const tokens=new Set();
  const words=text.replace(/[^\uAC00-\uD7A3a-zA-Z0-9+]/g,' ').split(/\s+/).filter(w=>w.length>1);
  words.forEach(w=>{tokens.add(w);if(SYNONYM[w])tokens.add(SYNONYM[w]);});
  const m=text.match(/(\d+)\s*세|(\d+)\s*살/);
  if(m){const age=parseInt(m[1]||m[2]);if(age>=18&&age<=39)tokens.add('청년');if(age>=65){tokens.add('노인');tokens.add('어르신');}if(age>=20&&age<=45)tokens.add('결혼');}
  if(text.includes('1인')&&(text.includes('가구')||text.includes('혼자')))tokens.add('1인가구');
  if(text.includes('전입')||text.includes('이사'))tokens.add('전입');
  return tokens;
}
function score(p,tokens){let s=0;tokens.forEach(t=>{p.kw.forEach(k=>{if(k===t)s+=3;else if(k.includes(t)||t.includes(k))s+=1;});});return s;}
function greetingFor(tokens){

  if(tokens.has('결혼')||tokens.has('신혼'))return '결혼·신혼 관련 정책을 찾아드렸어요.';
  if(tokens.has('청년')||tokens.has('취업'))return '청년 지원 정책을 찾아드렸어요.';
  if(tokens.has('노인')||tokens.has('어르신'))return '어르신 복지 정책을 찾아드렸어요.';
  if(tokens.has('다자녀')||tokens.has('셋째'))return '다자녀 가정 혜택을 찾아드렸어요.';
  if(tokens.has('귀농')||tokens.has('귀촌'))return '귀농·귀촌 지원 정책을 찾아드렸어요.';
  if(tokens.has('육아휴직')||tokens.has('보육'))return '육아·보육 관련 정책을 찾아드렸어요.';
  if(tokens.has('1인가구'))return '1인 가구를 위한 정책을 찾아드렸어요.';
  return '관련 정책을 찾아드렸어요.';
}

const chatArea=document.getElementById('chat-area');
const input=document.getElementById('user-input');
function fill(t){input.value=t;input.style.height='auto';input.focus();}
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px';});

function addBubble(html,cls){
  const d=document.createElement('div');d.className=cls;d.innerHTML=html;
  chatArea.appendChild(d);
  setTimeout(()=>d.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function send(){
  const q=input.value.trim();if(!q)return;
  input.value='';input.style.height='auto';
  addBubble(q,'bubble-user');
  const tokens=tokenize(q);
  const scored=POLICIES.map(p=>({p,s:score(p,tokens)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,6);
  if(!scored.length){
    addBubble('관련 정책을 찾지 못했어요.<br><span class="hint">예: "천안 전입 청년" / "임신 출산" / "다자녀 혜택"</span>','bubble-bot');
    return;
  }
  let html=`<div class="greeting">${greetingFor(tokens)}</div><div class="result-label">${scored.length}개 정책을 찾았어요</div><div class="p-cards">`;
  scored.forEach(({p})=>{
    const cl=catCls[p.cat]||'b-n';const lb=catLabel[p.cat]||p.cat;
    html+=`<div class="p-card">
      <div class="p-card-head">
        <span class="badge ${p.type==='n'?'b-n':'b-l'}">${p.type==='n'?'국가':'지자체'}</span>
        <span class="badge ${cl}">${lb}</span>
        <span class="p-name">${p.name}</span>
      </div>
      <div class="p-desc">${p.desc}</div>
      <div class="p-meta">
        <span><strong>혜택</strong> ${p.benefit}</span>
        <span><strong>대상</strong> ${p.target}</span>
      </div>
      <div class="p-contact"><strong>문의</strong> ${p.dept} · ${p.tel}</div>
    </div>`;
  });
  html+=`</div><div class="tip">자세한 신청 방법은 주소지 행정복지센터 또는 정부24(gov.kr)에서 확인하세요.</div>`;
  addBubble(html,'bubble-bot');
}
</script>
